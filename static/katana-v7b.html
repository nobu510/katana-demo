function shQA(){document.getElementById('qA').innerHTML=`<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:16px">🤖 AI見積作成</div><div class="fg"><label class="fl">AIへの指示</label><textarea class="fi" id="aiQ" rows="3" style="resize:vertical" placeholder="例：A社向けのクラウド導入見積を作って">A社向けのクラウド導入見積を作って</textarea></div><button onclick="aiGQ()" class="btn" style="background:#7c3aed;color:#fff;width:100%">🤖 生成</button><div id="aiQR"></div></div>`}
function aiGQ(){document.getElementById('aiQR').innerHTML='<div style="text-align:center;padding:20px;color:#7c3aed;animation:pulse 1s infinite">🤖 生成中...</div>';const input=document.getElementById('aiQ').value;let tmpl=null;for(const key in QTM){if(input.includes(key)){tmpl=QTM[key];break}}if(!tmpl)tmpl=QTM["A社"];setTimeout(()=>{const total=tmpl.items.reduce((s,it)=>s+it.q*it.p,0);const q={co:tmpl.co,ps:tmpl.ps,sb:tmpl.co.split('（')[0]+' 見積',ex:'2026/05/15',items:tmpl.items,total,tax:Math.round(total*.1),no:'QT-'+String(quotes.length+1).padStart(4,'0')};quotes.push(q);addMsg(1,'🤖 AI見積生成完了！ '+q.co+'宛 ¥'+fmt(q.total+q.tax));pvQ(quotes.length-1)},2500)}
function pvQ(i){const q=quotes[i],tot=q.total+q.tax;document.getElementById('qA').innerHTML=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:16px"><div style="font-size:14px;font-weight:700">📄 見積プレビュー</div><div style="display:flex;gap:8px"><button onclick="rQuote()" class="btn bs" style="font-size:12px">← 戻る</button><button onclick="dlPDF(${i})" class="btn bp" style="font-size:12px">📥 PDF</button></div></div><div style="background:#fff;border:2px solid #e5e7eb;border-radius:8px;padding:32px"><h2 style="text-align:center;font-size:22px;margin-bottom:24px;padding-bottom:12px;border-bottom:3px double #1a1a2e">御 見 積 書</h2><div style="display:flex;justify-content:space-between;margin-bottom:24px"><div><div style="font-size:16px;font-weight:700;border-bottom:2px solid #1a1a2e;padding-bottom:4px;margin-bottom:8px">${q.co} 御中</div><div style="font-size:12px;color:#6b7280">${q.ps} 様</div></div><div style="text-align:right;font-size:12px;color:#6b7280">見積番号: ${q.no}<br>発行日: 2026/04/15<br>有効期限: ${q.ex}<br><span style="font-weight:600;color:#1a1a2e;margin-top:4px;display:inline-block">株式会社J.NOVA</span></div></div><div style="background:#f5f3ff;border:1px solid #c4b5fd;border-radius:8px;padding:16px;margin-bottom:20px;text-align:center"><div style="font-size:12px;color:#6b7280">お見積金額（税込）</div><div style="font-size:28px;font-weight:900">¥${tot.toLocaleString()}-</div></div><table class="qt"><thead><tr><th style="width:50%">品目</th><th>数量</th><th>単価</th><th>金額</th></tr></thead><tbody>${q.items.map(it=>`<tr><td>${it.n}</td><td class="ar">${it.q}</td><td class="ar">¥${it.p.toLocaleString()}</td><td class="ar">¥${(it.q*it.p).toLocaleString()}</td></tr>`).join('')}<tr><td colspan="3" style="text-align:right;font-weight:600">小計</td><td class="ar" style="font-weight:600">¥${q.total.toLocaleString()}</td></tr><tr><td colspan="3" style="text-align:right">消費税(10%)</td><td class="ar">¥${q.tax.toLocaleString()}</td></tr><tr style="background:#f5f3ff"><td colspan="3" style="text-align:right;font-weight:700;font-size:14px">合計（税込）</td><td class="ar" style="font-weight:900;font-size:14px;color:#6366f1">¥${tot.toLocaleString()}</td></tr></tbody></table></div></div>`}
function dlPDF(i){const q=quotes[i],{jsPDF}=window.jspdf,doc=new jsPDF(),tot=q.total+q.tax;doc.setFontSize(22);doc.text("御 見 積 書",105,30,{align:"center"});doc.setLineWidth(.5);doc.line(30,35,180,35);doc.line(30,36,180,36);doc.setFontSize(14);doc.text(q.co+" 御中",30,50);doc.setFontSize(10);doc.text(q.ps+" 様",30,57);doc.text("見積番号: "+q.no,180,50,{align:"right"});doc.text("発行日: 2026/04/15",180,57,{align:"right"});doc.text("有効期限: "+q.ex,180,64,{align:"right"});doc.setFontSize(11);doc.text("株式会社J.NOVA",180,74,{align:"right"});doc.setFillColor(245,243,255);doc.rect(30,82,150,16,"F");doc.setFontSize(10);doc.text("お見積金額（税込）",105,89,{align:"center"});doc.setFontSize(16);doc.text("¥"+tot.toLocaleString()+"-",105,96,{align:"center"});let y=110;doc.setFillColor(243,244,246);doc.rect(30,y,150,8,"F");doc.setFontSize(9);doc.text("品目",32,y+6);doc.text("数量",120,y+6);doc.text("単価",140,y+6);doc.text("金額",165,y+6);y+=10;q.items.forEach(it=>{doc.text(it.n,32,y+4);doc.text(String(it.q),125,y+4,{align:"right"});doc.text("¥"+it.p.toLocaleString(),155,y+4,{align:"right"});doc.text("¥"+(it.q*it.p).toLocaleString(),178,y+4,{align:"right"});doc.line(30,y+6,180,y+6);y+=8});y+=4;doc.text("小計",155,y,{align:"right"});doc.text("¥"+q.total.toLocaleString(),178,y,{align:"right"});y+=7;doc.text("消費税(10%)",155,y,{align:"right"});doc.text("¥"+q.tax.toLocaleString(),178,y,{align:"right"});y+=7;doc.setFontSize(12);doc.text("合計",155,y,{align:"right"});doc.text("¥"+tot.toLocaleString(),178,y,{align:"right"});doc.save("見積書_"+q.no+".pdf");addMsg(1,"📥 PDF出力完了: "+q.no)}
function rCS(){const t=document.getElementById('pgT').textContent;document.getElementById('mCt').innerHTML=`<div style="text-align:center;padding:80px"><div style="font-size:64px;margin-bottom:20px">🚧</div><div style="font-size:20px;font-weight:700;margin-bottom:8px">${t}</div><div style="font-size:14px;color:#9ca3af;margin-bottom:24px">開発中</div><button onclick="gP('home')" class="btn bp">← ホームに戻る</button></div>`}
// CHAT - Real Claude API
function addMsg(isAI,text,actions,silent){msgs.push({ai:!!isAI,text,actions});if(!silent)rChat()}
function rChat(){const el=document.getElementById('chMs');if(!el)return;let h=msgs.map(m=>{if(!m.ai)return`<div class="cm u"><div class="cb u">${m.text}</div></div>`;let s=`<div class="cm a"><div class="cb a">${m.text}</div>`;if(m.actions)s+=`<div class="ca">${m.actions.map(a=>`<button class="cab" onclick="${a.act||`askAI('${a.label}')`}"><span class="icon">${a.icon}</span><div><div class="label" style="font-weight:600">${a.label}</div><div class="desc" style="font-size:10px;color:#9ca3af">${a.desc||''}</div></div></button>`).join('')}</div>`;return s+'</div>'}).join('');if(typi)h+=`<div class="cm a"><div class="dots"><span></span><span></span><span></span></div></div>`;el.innerHTML=h;el.scrollTop=el.scrollHeight}

async function askAI(q){msgs.push({ai:0,text:q});hist.push({role:"user",content:q});typi=true;rChat();
  // Add context about current month
  const d=calc(cm);
  const ctx=`\n[現在表示中: ${MO[cm]} / 未来利益:¥${fmt(d.future.profit)} / 今利益:¥${fmt(d.now.profit)} / CF利益:¥${fmt(d.cash.profit)} / 差額:¥${fmt(d.future.profit-d.cash.profit)} / 取引先${d.future.cnt}社]`;
  try{
    const rp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q+ctx,history:hist.slice(-8)})});
    const dt=await rp.json();typi=false;
    if(dt.reply){hist.push({role:"assistant",content:dt.reply});addMsg(1,dt.reply)}
    else addMsg(1,'⚠️ '+(dt.error||'エラーが発生しました'))
  }catch(e){typi=false;addMsg(1,'⚠️ 通信エラー: '+e.message)}
}

function sendChat(){const inp=document.getElementById('chIn'),q=inp.value.trim();if(!q||typi)return;inp.value='';updSn();if(cTab==='rag'){doRag(q);return}askAI(q)}
function updSn(){document.getElementById('sBtn').style.background=document.getElementById('chIn').value.trim()?'#6366f1':'#e5e7eb'}
document.getElementById('chIn').addEventListener('input',updSn);
document.getElementById('chIn').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});

// RAG
function setTab(t){cTab=t;document.getElementById('tChat').className='ch-tab'+(t==='chat'?' on':'');document.getElementById('tRag').className='ch-tab'+(t==='rag'?' on':'');document.getElementById('chMs').style.display=t==='chat'?'block':'none';document.getElementById('rP').style.display=t==='rag'?'block':'none';if(t==='rag')rRag();document.getElementById('chIn').placeholder=t==='chat'?'例：「未来の数字は？」':'社内文書を検索...'}
function rRag(){document.getElementById('rP').innerHTML=`<div style="font-size:13px;font-weight:600;margin-bottom:12px">📂 社内ドキュメント</div>${RAG.map(r=>`<div class="ri" onclick="shRag('${r.t}')"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${r.t}</span><span class="badge" style="background:${r.c}18;color:${r.c}">${r.tg}</span></div><div style="font-size:11px;color:#9ca3af">${r.tx.substring(0,60)}...</div></div>`).join('')}`}
function doRag(q){const res=RAG.filter(r=>r.t.includes(q)||r.tx.includes(q)||r.tg.includes(q));document.getElementById('rP').innerHTML=res.length?res.map(r=>`<div class="ri" onclick="shRag('${r.t}')"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:600">${r.t}</span><span class="badge" style="background:${r.c}18;color:${r.c}">${r.tg}</span></div><div style="font-size:11px;color:#9ca3af">${r.tx}</div></div>`).join(''):`<div style="text-align:center;padding:20px;color:#9ca3af;font-size:12px">「${q}」に一致なし</div>`}
function shRag(title){const r=RAG.find(x=>x.t===title);if(r){setTab('chat');askAI('社内文書「'+r.t+'」の内容を教えて。参考: '+r.tx)}}

// INIT
function init(){
  msgs=[{ai:1,text:"こんにちは！KATANA AI経営アシスタントです。\n\n何を体験しますか？",actions:[{icon:"📷",label:"レシートスキャン",desc:"AI OCRで自動読取",act:"gP('ocr')"},{icon:"📝",label:"見積書を作成",desc:"手動 or AI自動",act:"gP('quote')"},{icon:"📊",label:"経営ダッシュボード",desc:"3視点で分析",act:"gP('home')"}]}];
  rSB();rDash();rChat();rRag()
}
init();
</script>
